experimental_monorepo_root = true

[monorepo]
# This `config_roots` setting doesn't support recursive searches (e.g. "services/**"),
#   so this is instead an explicit list of projects
#   that we must keep updated as the monorepo evolves.
config_roots = [
  # FIXME Once we have projects, replace this with the actual project paths
  "*"
]

[tools]
yq = "latest"

[tasks.build]
description = "Build all projects"
# depends = [] -- add sub-project build tasks as projects are added

[tasks."lint:all"]
description = "Lint all projects"
# depends = [] -- add sub-project lint tasks as projects are added

[tasks."test:all"]
description = "Test all projects"
# depends = [] -- add sub-project test tasks as projects are added

[tasks.ci]
description = "Run full CI suite"
depends = ["build", "test:all", "lint:all"]

[tasks."ci:github:watch"]
description = "Watch GitHub PR checks"
run = "gh pr checks --watch --fail-fast"

[tasks."install:hooks"]
description = "Install git hooks"
run = "git config core.hooksPath .githooks && chmod +x .githooks/*"
