name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          use_sticky_comment: true
          track_progress: true
          bot_name: "claude"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Also review the PR's adherence to the repo's design and development process (see design/README.md):
            - If the PR implements a product requirement from design/product-requirements/, check whether it meets the acceptance criteria.
            - Check whether the code complies with the engineering principles in design/engineering-principles/.
            - If the PR implements an engineering design from design/engineering-designs/, check whether it follows the design.
            - Check whether relevant design docs were updated as needed for the changes in this PR (though it's fine if it diverges from implementation plans, as those as often just a starting plan).

            Use the repository's CLAUDE.md and .claude/rules/ files for guidance on style and conventions. Be constructive and helpful in your feedback.

            For specific code issues, use the mcp__github_inline_comment__create_inline_comment tool to post inline comments on the relevant lines in the diff. This makes feedback easier to act on.

            After reviewing all files, use `gh pr comment` to post a brief overall summary of the review.

            Only post GitHub comments - don't submit review text as messages.

          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),mcp__github_inline_comment__create_inline_comment"'
