name: Collect GitHub Analytics

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6 AM UTC
  workflow_dispatch:        # Allow manual trigger

concurrency:
  group: analytics-collection
  cancel-in-progress: false  # Serialize runs; don't cancel in-progress

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: justdavis-family/github-analytics-data
          # ANALYTICS_DATA_PAT needs repo scope for both data-repo push and
          # traffic/star API reads (traffic requires push access to the source repo).
          # A separate read-only PAT could be used for GITHUB_TOKEN below if the
          # data-repo push scope ever needs to be reduced.
          token: ${{ secrets.ANALYTICS_DATA_PAT }}
          path: analytics-data

      - uses: jdx/mise-action@v2

      - name: Write collector config
        # Define the repositories to collect here. Supported patterns:
        #   owner/repo         - a specific repository
        #   org:<orgname>      - all repos in a GitHub org
        #   user:<username>    - all repos for a GitHub user
        run: |
          cat > ${{ github.workspace }}/github-analytics/config.yaml <<'EOF'
          repos:
            - "org:justdavis-family"
            - "user:karlmdavis"
          EOF

      - name: Collect analytics
        id: collect
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.ANALYTICS_DATA_PAT }}
        run: >
          MISE_EXPERIMENTAL=1 mise run '//github-analytics:collect'
          -- --data-repo ${{ github.workspace }}/analytics-data
          --config ${{ github.workspace }}/github-analytics/config.yaml

      - name: Generate reports
        id: report
        continue-on-error: true
        run: >
          MISE_EXPERIMENTAL=1 mise run '//github-analytics:report'
          -- --data-repo ${{ github.workspace }}/analytics-data

      - name: Commit and push data
        run: |
          cd analytics-data
          git config user.name "GitHub Analytics Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet \
            || git commit -m "data: collect analytics $(date -u +%Y-%m-%d)"
          git push || (git pull --rebase && git push)

      - name: Fail if collection had errors
        if: steps.collect.outcome == 'failure' || steps.report.outcome == 'failure'
        run: exit 1
